<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快捷兑换指引</title>
    <style>
        :root {
            --primary: #0071e3;
            --success: #34c759;
            --bg: #f2f2f7;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; 
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }

        .wrapper { 
            max-width: 440px; 
            width: 100%;
            margin-top: 10px;
        }

        /* 顶部引导标题 */
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 24px; font-weight: 700; margin: 0; }
        header p { font-size: 14px; color: var(--text-secondary); margin-top: 8px; }

        /* 通用卡片样式 */
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .step-tag {
            display: inline-block;
            background: rgba(0,113,227,0.1);
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .card-title { font-size: 17px; font-weight: 600; margin-bottom: 15px; display: block; }

        /* 卡密展示 */
        .kami-box {
            background: #f5f5f7;
            border: 1px dashed #d2d2d7;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
        }
        #kami-value {
            font-size: 22px;
            font-weight: 700;
            font-family: "SF Mono", Menlo, monospace;
            color: #000;
            display: block;
            margin-bottom: 15px;
        }

        /* 按钮动画 */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }
        .btn-copy { background: #000; color: #fff; }
        .btn-link { background: var(--primary); color: #fff; }
        .btn:active { transform: scale(0.97); opacity: 0.9; }

        /* 说明文字列表 */
        .guide-list { margin: 0; padding: 0; list-style: none; }
        .guide-list li { 
            font-size: 14px; 
            color: #424245; 
            margin-bottom: 10px; 
            display: flex; 
            align-items: flex-start;
        }
        .guide-list li::before { content: "•"; color: var(--primary); font-weight: bold; width: 15px; flex-shrink: 0; }

        .img-stack { margin-top: 15px; }
        .img-stack img { 
            width: 100%; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            display: block;
            border: 1px solid rgba(0,0,0,0.05);
        }

        footer { text-align: center; padding: 20px 0 40px; font-size: 12px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>自助兑换指引</h1>
            <p>请按顺序完成以下操作</p>
        </header>
        
        <div class="card">
            <span class="step-tag">STEP 01</span>
            <span class="card-title">复制您的CDK</span>
            <div class="kami-box">
                <span id="kami-value">ABCDE-12345-FGHIJ</span>
                <button class="btn btn-copy" onclick="copyCode()">拷贝CDK代码</button>
            </div>
        </div>

        <div class="card">
            <span class="step-tag">STEP 02</span>
            <span class="card-title">前往兑换页面</span>
            <a href="https://example.com/redeem" class="btn btn-link" target="_blank">立即跳转兑换 →</a>
        </div>

        <div class="card">
            <span class="step-tag">STEP 03</span>
            <span class="card-title">按下图流程进行操作</span>
            <ul class="guide-list">
                <li>点击上方“拷贝”按钮获取专属代码。</li>
                <li>点击“跳转兑换”按钮进入官方操作页。</li>
                <li>在输入框粘贴代码并确认即可生效。</li>
            </ul>
            
            <div class="img-stack">
                <img src="微信图片_20260328155612_1_2.png" alt="Guide 1">
                <img src="微信图片_20260328155614_2_2.png" alt="Guide 2">
            </div>
        </div>

        <footer>
            由 自动化分发系统 提供支持
        </footer>
    </div>

    <script>
        function copyCode() {
            const text = document.getElementById('kami-value').innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const btn = document.querySelector('.btn-copy');
            const originalText = btn.innerText;
            btn.innerText = '已复制到剪贴板';
            btn.style.background = '#34c759';
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = '#000';
            }, 2000);
        }
    </script>
</body>
</html>
