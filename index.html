<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快捷兑换中心</title>
    <style>
        :root {
            --primary: #0071e3;
            --wechat: #07c160;
            --success: #34c759;
            --bg: #f5f5f7;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            
            /* 极致统一参数 */
            --border-radius-large: 24px;
            --border-radius-small: 14px;
            --box-padding: 22px;
            --btn-height: 50px;
            --font-size-display: 18px;
        }

        /* 全平台兼容补丁：强制 PC 端开启 Apple 级抗锯齿 */
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            box-sizing: border-box;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Segoe UI", "PingFang SC", sans-serif; 
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.5;
            text-rendering: optimizeLegibility;
        }

        /* 极致对齐：限制 PC 端最大宽度，防止横向变形 */
        .wrapper { 
            max-width: 440px; 
            width: 100%; 
            margin: 10px auto; 
        }

        header { text-align: center; margin-bottom: 35px; }
        header h1 { font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        header p { font-size: 15px; color: var(--text-secondary); margin-top: 8px; }

        /* 大版块容器样式 */
        .section-block {
            background: #ffffff;
            border-radius: var(--border-radius-large);
            padding: 26px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.02);
            overflow: hidden;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: block;
            border-bottom: 1px solid #f0f0f2;
            padding-bottom: 10px;
        }

        .inner-card { margin-bottom: 20px; }
        .inner-card:last-child { margin-bottom: 0; }
        .card-label { font-size: 16px; font-weight: 600; margin-bottom: 15px; display: block; }

        /* 统一的小方块样式模组 */
        .universal-info-box {
            background: #fbfbfd;
            border: 1px solid #d2d2d7;
            padding: var(--box-padding);
            border-radius: var(--border-radius-small);
            text-align: center;
            margin-bottom: 10px;
        }

        .display-content {
            font-size: var(--font-size-display);
            font-weight: 700;
            font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
            display: block;
            margin-bottom: 15px;
            letter-spacing: 0.8px;
            word-break: break-all;
        }
        #wechat-num { color: var(--wechat); }
        #kami-value { color: var(--text-main); }
        .link-text { color: var(--primary); }

        /* 按钮系统 */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: var(--btn-height);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            text-decoration: none;
        }
        
        .btn-black { background: #1d1d1f; color: #fff; }
        .btn-link { background: var(--primary); color: #fff; }
        .btn-wechat { background: var(--wechat); color: #fff; }
        
        /* 增加 PC 端悬停特效，手机端保留点击特效 */
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: scale(0.98); }

        /* 图片组件 */
        .img-stack img { 
            width: 100%; 
            border-radius: 16px; 
            margin-top: 10px; 
            display: block;
            border: 1px solid rgba(0,0,0,0.05);
            background: #eee; /* 图片未加载时的占位色 */
        }

        footer { text-align: center; padding: 15px 0 50px; font-size: 11px; color: var(--text-secondary); opacity: 0.8; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>自助兑换服务</h1>
            <p>轻松三步，开启会员体验</p>
        </header>

        <div class="section-block" style="border-top: 5px solid var(--wechat);">
            <span class="section-title">Support / 售后支持</span>
            <div class="inner-card">
                <span class="card-label">联系客服微信</span>
                <div class="universal-info-box">
                    <span id="wechat-num" class="display-content">WX_12345678</span>
                    <button class="btn btn-wechat" onclick="copyText('wechat-num', this, '复制微信号', '#07c160')">复制微信号并去添加</button>
                </div>
            </div>
        </div>

        <div class="section-block" style="border-top: 5px solid var(--primary);">
            <span class="section-title">Redeem / 兑换步骤</span>
            
            <div class="inner-card">
                <span class="card-label">01. 拷贝您的CDK</span>
                <div class="universal-info-box">
                    <span id="kami-value" class="display-content">等待领取...</span>
                    <button class="btn btn-black" onclick="copyText('kami-value', this, '拷贝代码', '#1d1d1f')">拷贝CDK代码</button>
                </div>
            </div>

            <div class="inner-card">
                <span class="card-label">02. 访问兑换页</span>
                <div class="universal-info-box">
                    <span class="display-content link-text">官方指定兑换通道</span>
                    <a href="https://example.com/redeem" class="btn btn-link" target="_blank">立即跳转兑换 →</a>
                </div>
            </div>

            <div class="inner-card">
                <span class="card-label">03. 流程参考图</span>
                <div class="img-stack">
                    <img src="微信图片_20260328155612_1_2.png" alt="步骤1">
                    <img src="微信图片_20260328155614_2_2.png" alt="步骤2">
                </div>
            </div>
        </div>

        <footer>© 2026 自动化分发系统 · 全平台兼容版</footer>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const myId = urlParams.get('id');
            if (myId) {
                document.getElementById('kami-value').innerText = myId;
            }
        };

        function copyText(elementId, btnElement, originalText, originalBg) {
            const text = document.getElementById(elementId).innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            btnElement.innerText = '✅ 已复制到剪贴板';
            btnElement.style.background = 'var(--success)';
            
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.style.background = originalBg;
            }, 2000);
        }
    </script>
</body>
</html>
