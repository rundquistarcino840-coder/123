<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快捷兑换指引</title>
    <style>
        :root {
            --primary: #0071e3;
            --success: #34c759;
            --wechat: #07c160; /* 微信绿 */
            --bg: #f5f5f7;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            background: linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper { max-width: 440px; width: 100%; margin-top: 10px; }

        header { text-align: center; margin-bottom: 35px; }
        header h1 { font-size: 26px; font-weight: 700; margin: 0; }
        header p { font-size: 15px; color: var(--text-secondary); margin-top: 8px; }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 26px;
            margin-bottom: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .step-tag {
            display: inline-block;
            background: rgba(0,113,227,0.08);
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 12px;
            letter-spacing: 0.8px;
        }

        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; display: block; }

        .kami-box {
            background: #fbfbfd;
            border: 1px solid #d2d2d7;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        #kami-value {
            font-size: 24px;
            font-weight: 700;
            font-family: "SF Mono", Menlo, monospace;
            display: block;
            margin-bottom: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-copy { background: #1d1d1f; color: #fff; }
        .btn-link { background: var(--primary); color: #fff; }
        .btn-wechat { background: var(--wechat); color: #fff; margin-top: 10px; }
        
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        /* 微信引流区域 */
        .wechat-section {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #e5e5e5;
            margin-bottom: 20px;
        }
        .wechat-id { font-weight: 700; color: var(--wechat); font-size: 18px; margin-bottom: 10px; display: block; }

        .img-stack img { 
            width: 100%; 
            border-radius: 16px; 
            margin-top: 15px; 
            display: block;
            border: 1px solid rgba(0,0,0,0.05);
        }

        footer { text-align: center; padding: 20px 0 60px; font-size: 12px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>自助兑换指引</h1>
            <p>获取CDK后请按图示完成操作</p>
        </header>
        
        <div class="card">
            <span class="step-tag">STEP 01</span>
            <span class="card-title">复制您的专属CDK</span>
            <div class="kami-box">
                <span id="kami-value">ABCDE-12345-FGHIJ</span>
                <button class="btn btn-copy" onclick="copyText('kami-value', this, '拷贝CDK代码')">拷贝CDK代码</button>
            </div>
        </div>

        <div class="card">
            <span class="step-tag">STEP 02</span>
            <span class="card-title">前往兑换页面</span>
            <a href="https://example.com/redeem" class="btn btn-link" target="_blank">立即跳转兑换 →</a>
        </div>

        <div class="card">
            <span class="step-tag">CONTACT</span>
            <span class="card-title">售后与咨询</span>
            <p style="font-size: 14px; color: #424245; margin-bottom: 15px;">如果您在兑换过程中遇到任何问题，请添加客服微信：</p>
            <span class="wechat-id" id="wechat-num">WX_12345678</span>
            <button class="btn btn-wechat" onclick="copyText('wechat-num', this, '复制微信并去添加')">复制微信号</button>
        </div>

        <div class="card">
            <span class="step-tag">GUIDE</span>
            <span class="card-title">操作流程参考</span>
            <div class="img-stack">
                <img src="微信图片_20260328155612_1_2.png" alt="步骤1">
                <img src="微信图片_20260328155614_2_2.png" alt="步骤2">
            </div>
        </div>

        <footer>© 2026 自动化分发系统</footer>
    </div>

    <script>
        // 通用的复制函数
        function copyText(elementId, btnElement, originalText) {
            const text = document.getElementById(elementId).innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            btnElement.innerText = '✅ 已成功复制';
            const oldBg = btnElement.style.background;
            btnElement.style.background = 'var(--success)';
            
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.style.background = oldBg;
            }, 2000);
        }
    </script>
</body>
</html>
