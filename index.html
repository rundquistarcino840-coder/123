<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快捷兑换中心</title>
    <style>
        :root {
            --primary: #0071e3;
            --success: #34c759;
            --wechat: #07c160; 
            --bg: #f5f5f7;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; 
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper { max-width: 460px; width: 100%; }

        header { text-align: center; margin: 20px 0 30px; }
        header h1 { font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        header p { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }

        /* 大版块容器样式 */
        .section-block {
            background: #ffffff;
            border-radius: 28px;
            padding: 26px;
            margin-bottom: 30px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.02);
            overflow: hidden; /* 确保装饰条圆角贴合 */
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 22px;
            display: block;
            border-bottom: 1px solid #f2f2f4;
            padding-bottom: 12px;
        }

        .inner-card { margin-bottom: 24px; }
        .inner-card:last-child { margin-bottom: 0; }
        .card-label { font-size: 16px; font-weight: 600; margin-bottom: 14px; display: block; color: #000; }

        /* --- 核心：完全统一的展示盒子样式 --- */
        .universal-box {
            background: #fbfbfd;
            border: 1px dashed #d2d2d7; /* 统一使用虚线，增加“凭证感” */
            padding: 22px;
            border-radius: 18px;
            text-align: center;
            transition: all 0.2s ease;
        }

        /* 统一的内容文字样式 */
        .display-content {
            font-size: 22px;
            font-weight: 700;
            font-family: "SF Mono", "ui-monospace", Menlo, monospace;
            display: block;
            margin-bottom: 18px;
            letter-spacing: 1px;
            word-break: break-all;
        }

        /* 独立颜色区分 */
        #wechat-num { color: var(--wechat); }
        #kami-value { color: #000; }
        .link-text { color: var(--primary); font-size: 18px; }

        /* 按钮系统 */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }
        .btn-copy-black { background: #1d1d1f; color: #fff; }
        .btn-link { background: var(--primary); color: #fff; }
        .btn-wechat { background: var(--wechat); color: #fff; }
        .btn:active { transform: scale(0.97); opacity: 0.9; }

        /* 图片样式 */
        .img-stack img { 
            width: 100%; 
            border-radius: 16px; 
            margin-top: 10px; 
            display: block;
            border: 1px solid rgba(0,0,0,0.06);
        }

        footer { text-align: center; padding: 10px 0 50px; font-size: 11px; color: var(--text-secondary); letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>自助兑换中心</h1>
            <p>轻松获取并激活您的会员权限</p>
        </header>

        <div class="section-block" style="border-top: 5px solid var(--wechat);">
            <span class="section-title">Support / 售后支持</span>
            <div class="inner-card">
                <span class="card-label">添加客服微信</span>
                <div class="universal-box">
                    <span id="wechat-num">WX_12345678</span>
                    <button class="btn btn-wechat" onclick="copyText('wechat-num', this, '复制微信号', '#07c160')">复制微信号并去添加</button>
                </div>
            </div>
        </div>

        <div class="section-block" style="border-top: 5px solid var(--primary);">
            <span class="section-title">Redeem / 兑换步骤</span>
            
            <div class="inner-card">
                <span class="card-label">01. 拷贝您的CDK</span>
                <div class="universal-box">
                    <span id="kami-value">ABCDE-12345-FGHIJ</span>
                    <button class="btn btn-copy-black" onclick="copyText('kami-value', this, '拷贝CDK代码', '#1d1d1f')">拷贝代码</button>
                </div>
            </div>

            <div class="inner-card">
                <span class="card-label">02. 访问兑换页</span>
                <div class="universal-box">
                    <span class="display-content link-text">官方指定兑换通道</span>
                    <a href="https://example.com/redeem" class="btn btn-link" target="_blank">立即跳转兑换 →</a>
                </div>
            </div>

            <div class="inner-card">
                <span class="card-label">03. 流程参考图</span>
                <div class="img-stack">
                    <img src="微信图片_20260328155612_1_2.png" alt="参考图1">
                    <img src="微信图片_20260328155614_2_2.png" alt="参考图2">
                </div>
            </div>
        </div>

        <footer>© 2026 自动化分发系统 · 安全加密链接</footer>
    </div>

    <script>
        function copyText(elementId, btnElement, originalText, originalBg) {
            const text = document.getElementById(elementId).innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            btnElement.innerText = '✅ 已复制到剪贴板';
            btnElement.style.background = 'var(--success)';
            
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.style.background = originalBg;
            }, 2000);
        }
    </script>
</body>
</html>
