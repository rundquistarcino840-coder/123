<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快捷兑换中心</title>
    <style>
        :root {
            --primary: #0071e3;
            --success: #34c759;
            --wechat: #07c160; 
            --bg: #f5f5f7;
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .wrapper { max-width: 460px; width: 100%; }

        header { text-align: center; margin: 20px 0 30px; }
        header h1 { font-size: 24px; font-weight: 700; margin: 0; }
        header p { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }

        /* 大版块容器样式 */
        .section-block {
            background: #ffffff;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
            overflow: hidden;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: block;
            border-bottom: 1px solid #f0f0f2;
            padding-bottom: 10px;
        }

        /* 内部小卡片样式 */
        .inner-card {
            margin-bottom: 20px;
        }
        .inner-card:last-child { margin-bottom: 0; }

        .card-label { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: block; }

        /* 统一的展示盒子 */
        .info-box {
            background: #fbfbfd;
            border: 1px dashed #d2d2d7;
            padding: 18px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 10px;
        }

        #kami-value, #wechat-num, .link-display-text {
            font-size: 22px;
            font-weight: 700;
            font-family: "SF Mono", Menlo, monospace;
            display: block;
            margin-bottom: 15px;
            letter-spacing: 1px;
            word-break: break-all;
        }
        #wechat-num { color: var(--wechat); }
        .link-display-text { font-size: 17px; color: var(--primary); }

        /* 按钮系统 */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }
        .btn-copy { background: #1d1d1f; color: #fff; }
        .btn-link { background: var(--primary); color: #fff; }
        .btn-wechat { background: var(--wechat); color: #fff; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        /* 图片样式 */
        .img-stack img { 
            width: 100%; 
            border-radius: 14px; 
            margin-top: 10px; 
            display: block;
            border: 1px solid rgba(0,0,0,0.05);
        }

        footer { text-align: center; padding: 10px 0 50px; font-size: 12px; color: var(--text-secondary); }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>自助兑换服务</h1>
            <p>轻松三步，开启会员体验</p>
        </header>

        <div class="section-block" style="border-top: 5px solid var(--wechat);">
            <span class="section-title">Support / 售后支持</span>
            <div class="inner-card">
                <span class="card-label">联系客服微信</span>
                <div class="info-box">
                    <span id="wechat-num">WX_12345678</span>
                    <button class="btn btn-wechat" onclick="copyText('wechat-num', this, '复制微信号', '#07c160')">复制微信号</button>
                </div>
            </div>
        </div>

        <div class="section-block" style="border-top: 5px solid var(--primary);">
            <span class="section-title">Redeem / 兑换流程</span>
            
            <div class="inner-card">
                <span class="card-label">01. 拷贝您的CDK</span>
                <div class="info-box">
                    <span id="kami-value">等待领取...</span>
                    <button class="btn btn-copy" onclick="copyText('kami-value', this, '拷贝代码', '#1d1d1f')">拷贝CDK代码</button>
                </div>
            </div>

            <div class="inner-card">
                <span class="card-label">02. 访问兑换页</span>
                <div class="info-box">
                    <span class="link-display-text">官方指定兑换通道</span>
                    <a href="https://example.com/redeem" class="btn btn-link" target="_blank">立即跳转 →</a>
                </div>
            </div>

            <div class="inner-card">
                <span class="card-label">03. 流程参考图</span>
                <div class="img-stack">
                    <img src="微信图片_20260328155612_1_2.png" alt="Guide 1">
                    <img src="微信图片_20260328155614_2_2.png" alt="Guide 2">
                </div>
            </div>
        </div>

        <footer>© 2026 自动化分发系统</footer>
    </div>

    <script>
        // --- 仅增加自动抓取参数功能，其余逻辑不动 ---
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const myId = urlParams.get('id'); // 抓取链接后 ?id= 的内容
            if (myId) {
                document.getElementById('kami-value').innerText = myId;
            }
        };

        function copyText(elementId, btnElement, originalText, originalBg) {
            const text = document.getElementById(elementId).innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            btnElement.innerText = '✅ 已成功复制';
            btnElement.style.background = 'var(--success)';
            
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.style.background = originalBg;
            }, 2000);
        }
    </script>
</body>
</html>
