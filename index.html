<style>
    :root {
        --primary: #0071e3;
        --wechat: #07c160;
        --success: #34c759;
        /* 1. 稍微加深背景色，确保在 PC 端能一眼看出卡片轮廓 */
        --bg: #ececef; 
        --text-main: #1d1d1f;
        --text-secondary: #86868b;
        
        --border-radius-large: 24px;
        --border-radius-small: 14px;
        --box-padding: 22px;
        --btn-height: 50px;
        --font-size-display: 18px;
    }

    * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        box-sizing: border-box;
    }

    body { 
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; 
        background-color: var(--bg);
        margin: 0;
        padding: 20px;
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        align-items: center;
        line-height: 1.5;
    }

    .wrapper { 
        max-width: 440px; 
        width: 100%; 
        margin: 10px auto; 
    }

    /* 2. 强化大版块容器：增加边框清晰度，防止与背景融合 */
    .section-block {
        background: #ffffff;
        border-radius: var(--border-radius-large);
        padding: 26px;
        margin-bottom: 25px;
        /* 增加阴影深度，并给一个更明确的浅灰边框 */
        box-shadow: 0 8px 30px rgba(0,0,0,0.08); 
        border: 1px solid rgba(0,0,0,0.08); 
        overflow: hidden;
    }

    /* 3. 强化内部小方块：在 PC 端也需要更清晰 */
    .universal-info-box {
        background: #fbfbfd;
        border: 1.5px solid #d2d2d7; /* 稍微加粗一点点边框线 */
        padding: var(--box-padding);
        border-radius: var(--border-radius-small);
        text-align: center;
        margin-bottom: 10px;
    }

    /* 其余部分保持不变... */
    .section-title {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 20px;
        display: block;
        border-bottom: 1px solid #f0f0f2;
        padding-bottom: 10px;
    }

    .inner-card { margin-bottom: 20px; }
    .card-label { font-size: 16px; font-weight: 600; margin-bottom: 15px; display: block; }

    .display-content {
        font-size: var(--font-size-display);
        font-weight: 700;
        font-family: "SF Mono", Menlo, monospace;
        display: block;
        margin-bottom: 15px;
        letter-spacing: 0.8px;
        word-break: break-all;
    }
    #wechat-num { color: var(--wechat); }
    #kami-value { color: var(--text-main); }
    .link-text { color: var(--primary); }

    .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: var(--btn-height);
        border: none;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        text-decoration: none;
    }
    .btn-black { background: #1d1d1f; color: #fff; }
    .btn-link { background: var(--primary); color: #fff; }
    .btn-wechat { background: var(--wechat); color: #fff; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: scale(0.98); }

    .img-stack img { 
        width: 100%; 
        border-radius: 16px; 
        margin-top: 10px; 
        display: block;
        border: 1px solid rgba(0,0,0,0.05);
    }

    footer { text-align: center; padding: 15px 0 50px; font-size: 11px; color: var(--text-secondary); opacity: 0.8; }
</style>
